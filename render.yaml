# Render Blueprint — backend FastAPI (Turismo que se Sente)
# Publica o backend como Web Service. Nenhum segredo fica versionado:
# todas as variáveis sensíveis usam `sync: false` e são definidas no painel do Render.
services:
  - type: web
    name: turismo-que-se-sente-api
    runtime: python
    rootDir: backend
    plan: free
    # emergentintegrations não está no PyPI público; o extra-index-url resolve esse
    # pacote enquanto os demais continuam vindo do PyPI.
    buildCommand: "pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Defina os valores abaixo no painel do Render (Environment). Não versione segredos.
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      # Cloudinary: use CLOUDINARY_URL OU o trio cloud_name/api_key/api_secret.
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
